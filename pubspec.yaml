name: peer_buddy
description: Peer Buddy Mentoring & Community App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  cloud_functions: ^4.6.0

  # State Management
  provider: ^6.1.2
  rxdart: ^0.28.0

  # Chat & Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.7.4

  # UI & Navigation
  go_router: ^13.2.0
  flutter_chat_ui: ^1.6.12
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Calendar & Notifications
  table_calendar: ^3.1.0
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.4

  # File Handling
  file_picker: ^8.0.2
  open_file: ^3.3.2
  path_provider: ^2.1.3
  image_picker: ^1.0.7

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

