name: ragsafe_sl
description: RagSafe - Anti-Ragging App with Education Hub & User Dashboard

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^8.0.2
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8
  
  # Firebase Services
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  js: ^0.7.2
  
  # Reporting & SOS Features
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  shake: ^3.0.0
  url_launcher: ^6.3.2
  supabase_flutter: ^2.12.1
  cloudinary_sdk: ^5.0.0+1
  http: ^1.2.0
  camera: ^0.11.0+2
  record: ^6.2.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  gal: ^2.3.0
  video_player: ^2.9.1
  google_maps_flutter: ^2.10.0
  intl: ^0.20.2
  timeline_tile: ^2.0.0 # for the vertical timeline in StatusTrackerScreen

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"